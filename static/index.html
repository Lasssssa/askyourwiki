<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AskYourWiki</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app" id="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="brand">
          <svg class="brand-logo" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M22.65 10.31 12 18.71 1.35 10.31a.84.84 0 0 1-.31-.94l1.71-5.27a.42.42 0 0 1 .8 0l1.72 5.27h6.46l1.72-5.27a.42.42 0 0 1 .8 0l1.72 5.27a.84.84 0 0 1-.32.94Z"/>
          </svg>
          <span class="brand-name">AskYourWiki</span>
        </div>
        <button id="sidebar-close" class="icon-btn sidebar-close" aria-label="Fermer le menu">✕</button>
      </div>

      <button id="new-chat-btn" class="new-chat-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5"
              y1="12" x2="19" y2="12"></line></svg>
        Nouvelle conversation
      </button>

      <div class="sidebar-section">
        <h2 class="sidebar-section-title">Statut</h2>
        <div class="status-card">
          <div class="status-row">
            <span class="status-label">Pages indexées</span>
            <span id="status-pages" class="status-value">—</span>
          </div>
          <div class="status-row">
            <span class="status-label">Dernière synchro</span>
            <span id="status-sync" class="status-value">—</span>
          </div>
          <div id="status-error" class="status-error" hidden></div>
        </div>

        <button id="sync-btn" class="sync-btn">
          <span id="sync-spinner" class="spinner" hidden></span>
          <span id="sync-label">Synchroniser les wikis</span>
        </button>
      </div>

      <div class="sidebar-footer">
        <a id="gitlab-link" class="gitlab-link" href="#" target="_blank" rel="noopener noreferrer" hidden>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M22.65 10.31 12 18.71 1.35 10.31a.84.84 0 0 1-.31-.94l1.71-5.27a.42.42 0 0 1 .8 0l1.72 5.27h6.46l1.72-5.27a.42.42 0 0 1 .8 0l1.72 5.27a.84.84 0 0 1-.32.94Z"/>
          </svg>
          <span id="gitlab-link-text">Instance GitLab</span>
        </a>
      </div>
    </aside>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Main -->
    <div class="main">
      <header class="main-header">
        <button id="sidebar-open" class="icon-btn sidebar-open" aria-label="Afficher le menu">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3"
                y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <h1 id="header-title">Assistant Wiki GitLab</h1>
      </header>

      <main class="chat-area" id="chat-area">
        <div class="messages" id="messages">
          <div class="welcome" id="welcome">
            <div class="welcome-logo">📚</div>
            <h2>Posez une question sur vos wikis</h2>
            <p>Les réponses sont générées à partir du contenu des wikis GitLab indexés.</p>
          </div>
        </div>
      </main>

      <footer class="composer">
        <div class="composer-inner">
          <textarea
            id="message-input"
            class="composer-input"
            placeholder="Écrivez votre message... (Shift+Entrée pour un saut de ligne)"
            rows="1"
          ></textarea>
          <button id="send-btn" class="send-btn" aria-label="Envoyer le message" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline
                  points="5 12 12 5 19 12"></polyline></svg>
          </button>
        </div>
        <p class="composer-hint">L'assistant peut faire des erreurs. Vérifiez les informations importantes.</p>
      </footer>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/common.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked-highlight@2.1.1/lib/index.umd.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
